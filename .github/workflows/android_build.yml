name: Build Android APK

on:
  push:
    branches:
      - main  # Triggers the build every time you push to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK (Release Mode)
        run: |
          run: flutter build apk --release --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }}

      - name: Save APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kebele-app-apks
          path: build/app/outputs/flutter-apk/*.apk